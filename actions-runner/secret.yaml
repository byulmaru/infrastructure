apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: arc-github-app
  namespace: arc-runners
spec:
  resyncInterval: 60
  authentication:
    kubernetesAuth:
      identityId: 953a7c79-6486-44d6-a6be-04dd7eda1853
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: secret
        namespace: infisical

      secretsScope:
        projectId: 79bea98e-4bbf-4cae-a39d-93d595b22420
        envSlug: prod
        secretsPath: /
  managedKubeSecretReferences:
    - secretName: arc-github-app
      secretNamespace: arc-runners
      secretType: Opaque
