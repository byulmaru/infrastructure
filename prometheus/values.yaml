alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: oci-fs
          accessModes: ["ReadWriteMany"]
          resources:
            requests:
              storage: 10Gi
grafana:
  ingress:
    enabled: true
    ingressClassName: tailscale
    tls:
      - hosts:
          - grafana
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: oci.oraclecloud.com/oke-is-preemptible
                operator: Exists
                values: []
  tolerations:
    - key: "oci.oraclecloud.com/oke-is-preemptible"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: oci-fs
    accessModes: ["ReadWriteMany"]
  initChownData:
    enabled: false
prometheus:
  prometheusSpec:
    retentionSize: "50GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: oci-bv
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: Exists
kube-state-metrics:
  metricLabelsAllowlist:
    - nodes=[oci.oraclecloud.com/oke-is-preemptible]
